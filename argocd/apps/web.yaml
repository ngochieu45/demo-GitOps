# file: argocd/apps/web.yaml  (tạo folder argocd/apps/)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: web, namespace: argocd }
spec:
  project: default
  source: { 
    repoURL: https://github.com/ngochieu45/demo-GitOps.git, 
    targetRevision: HEAD,
    path: k8s 
    }
  destination: { 
    server: https://kubernetes.default.svc, 
    namespace: demo 
    }
  syncPolicy: { 
    automated: { 
      prune: true, 
      selfHeal: true 
      } 
    }