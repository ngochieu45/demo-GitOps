apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ngochieu45/demo-GitOps.git
    targetRevision: HEAD
    path: k8s-api

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true